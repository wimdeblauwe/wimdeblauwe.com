baseURL = "https://www.wimdeblauwe.com/"
locale = "en-us"
title = "Wim Deblauwe"
copyright = "© 2022 Wim Deblauwe"
googleAnalytics = "G-VJZ8LM94JG"
mainSections = ["blog"]

[params]
    images = ['images/wim-deblauwe.jpg']
    favicon = 'favicon.svg'
    featureNewBook = false

[[menu.main]]
name = "Blog"
url = "/"
weight = 1

[[menu.main]]
name = "Projects"
url = "/projects"
weight = 2

[[menu.main]]
name = "Books"
url = "/books"
weight = 3

[[menu.main]]
name = "Conferences"
url = "/conferences"
weight = 4

[[menu.main]]
name = "About"
url = "/about"
weight = 5

# Enable tags.
[taxonomies]
tag = "tags"

# Emit <a class="anchor" href="#id"> before each section heading (styled as a
# copper diamond in CSS) without touching the per-post .adoc attributes.
[markup.asciidocExt.attributes]
sectanchors = ""

[privacy.youtube]
privacyEnhanced = true

[privacy.googleAnalytics]
anonymizeIP = true
respectDoNotTrack = true
useSessionStorage = true

[security]
enableInlineShortcodes = false
# Non-blog pages are text/html content files; newer Hugo versions deny those by default.
allowContent = ['.*']

[security.exec]
allow = ['^dart-sass-embedded$', '^go$', '^npx$', '^postcss$', 'asciidoctor']
osEnv = ['(?i)^(PATH|PATHEXT|APPDATA|TMP|TEMP|TERM|GEM_PATH)$']

[security.funcs]
getenv = ['^HUGO_']

[security.http]
methods = ['(?i)GET|POST']
urls = ['.*']
