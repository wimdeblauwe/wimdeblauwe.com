[build]
    publish = "public"
    command = "hugo && npx -y pagefind --site public"

[build.environment]
    HUGO_VERSION = "0.163.0"
    NODE_VERSION = "24"

[context.production.environment]
    HUGO_ENV = "production"

[context.deploy-preview]
    command = "hugo -D -F -b $DEPLOY_PRIME_URL/ && npx -y pagefind --site public"

[context.branch-deploy]
    command = "hugo -D -F -b $DEPLOY_PRIME_URL/ && npx -y pagefind --site public"
